<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MovieRecommender &mdash; Mood-Based Movie Discovery</title>
  
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="components.css" />
  
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
    <header class="site-header">
    <div class="logo">
      <span class="logo-icon"><i class="fa-solid fa-film"></i></span>
      <span class="logo-text">Movie<em>Recommender</em></span>
    </div>

    <nav class="header-nav">
      <a href="#mood-section">Mood</a>
      <a href="#filter-section">Filters</a>
      <a href="#results-section">Discover</a>
    </nav>

    <div class="api-badge">
      <span class="dot"></span> Live TMDB Data
    </div>
  </header>

  <section class="hero">
    <div class="hero-bg-text">Movie</div>
    <div class="hero-content">
      <p class="hero-eyebrow">Advanced Filtering &amp; Mood-Based</p>
      <h1 class="hero-title">Find Your<br/><em>Perfect Film</em></h1>
      <p class="hero-sub">Tell us how you feel tonight — we'll handle the rest.</p>
      <a href="#mood-section" class="hero-cta">
        Start Exploring <i class="fa-solid fa-arrow-down"></i>
      </a>
    </div>

    <div class="hero-stats">
      <div class="stat">
        <span id="stat-total">800k+</span>
        <label>Movies</label>
      </div>
      <div class="stat">
        <span>Live</span>
        <label>TMDB API</label>
      </div>
      <div class="stat">
        <span>10</span>
        <label>Moods</label>
      </div>
    </div>
  </section>

  <section class="section" id="mood-section">
    <div class="section-label">01 &mdash; Choose Your Mood</div>
    <h2 class="section-title">How are you feeling <em>tonight?</em></h2>

    <div class="mood-grid">
      <button class="mood-btn active" data-mood="happy" data-genres="35,10751">
        <span class="mood-emoji">😄</span>
        <span class="mood-name">Happy</span>
        <span class="mood-sub">Comedy &middot; Family</span>
      </button>

      <button class="mood-btn" data-mood="sad" data-genres="18">
        <span class="mood-emoji">😢</span>
        <span class="mood-name">Sad</span>
        <span class="mood-sub">Drama &middot; Emotional</span>
      </button>

      <button class="mood-btn" data-mood="excited" data-genres="28,12">
        <span class="mood-emoji">⚡</span>
        <span class="mood-name">Excited</span>
        <span class="mood-sub">Action &middot; Adventure</span>
      </button>

      <button class="mood-btn" data-mood="scared" data-genres="27,53">
        <span class="mood-emoji">👻</span>
        <span class="mood-name">Scared</span>
        <span class="mood-sub">Horror &middot; Thriller</span>
      </button>

      <button class="mood-btn" data-mood="romantic" data-genres="10749">
        <span class="mood-emoji">💕</span>
        <span class="mood-name">Romantic</span>
        <span class="mood-sub">Romance &middot; Drama</span>
      </button>

      <button class="mood-btn" data-mood="curious" data-genres="99,36">
        <span class="mood-emoji">🔍</span>
        <span class="mood-name">Curious</span>
        <span class="mood-sub">Documentary &middot; History</span>
      </button>

      <button class="mood-btn" data-mood="adventurous" data-genres="878,14">
        <span class="mood-emoji">🚀</span>
        <span class="mood-name">Adventurous</span>
        <span class="mood-sub">Sci-Fi &middot; Fantasy</span>
      </button>

      <button class="mood-btn" data-mood="tense" data-genres="80,9648">
        <span class="mood-emoji">🎭</span>
        <span class="mood-name">Tense</span>
        <span class="mood-sub">Crime &middot; Mystery</span>
      </button>

      <button class="mood-btn" data-mood="nostalgic" data-genres="16,10751">
        <span class="mood-emoji">🌅</span>
        <span class="mood-name">Nostalgic</span>
        <span class="mood-sub">Animation &middot; Family</span>
      </button>

      <button class="mood-btn" data-mood="musical" data-genres="10402">
        <span class="mood-emoji">🎵</span>
        <span class="mood-name">Musical</span>
        <span class="mood-sub">Music &middot; Drama</span>
      </button>
    </div>
  </section>
  
</body>
</html>
